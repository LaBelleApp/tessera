<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Tessera">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6a8"/>
      <stop offset=".5" stop-color="#e8b04b"/>
      <stop offset="1" stop-color="#b97f2e"/>
    </linearGradient>
  </defs>
  <!-- dark tile background so it reads on light and dark browser tabs -->
  <rect width="64" height="64" rx="14" fill="#0a1c28"/>
  <!-- gold hexagon (the tessera) -->
  <polygon points="32,7 53.7,19.5 53.7,44.5 32,57 10.3,44.5 10.3,19.5"
           fill="url(#gold)" stroke="#ffe6a8" stroke-width="1.5"/>
  <!-- inner gem -->
  <polygon points="32,18 42,24 42,40 32,46 22,40 22,24" fill="#0a1c28" opacity=".85"/>
  <polygon points="32,18 42,24 42,40 32,46 22,40 22,24" fill="#4fd6e0" opacity=".18"/>
  <polygon points="32,18 42,24 42,40 32,46 22,40 22,24" fill="none" stroke="#4fd6e0" stroke-width="2"/>
  <!-- core -->
  <circle cx="32" cy="32" r="4.5" fill="#ffe6a8"/>
</svg>
